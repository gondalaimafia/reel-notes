<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; block-all-mixed-content">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="theme-color" content="#f7f7f4" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#101412" media="(prefers-color-scheme: dark)">
    <title>{% if page.seo_title %}{{ page.seo_title }}{% else %}{{ page.title }}{% endif %} | Reel Notes</title>
    <meta name="description" content="{{ page.description }}">
    {% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">{% endif %}
    <meta name="author" content="Reel Notes contributors">
    <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <meta property="og:site_name" content="Reel Notes">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.description }}">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "TechArticle",
            "@id": "{{ site.url }}{{ site.baseurl }}{{ page.url }}#article",
            "headline": {{ page.title | jsonify }},
            "description": {{ page.description | jsonify }},
            "author": {
              "@type": "Organization",
              "name": "Reel Notes contributors"
            },
            "publisher": {
              "@type": "Organization",
              "name": "Reel Notes"
            },
            "mainEntityOfPage": "{{ site.url }}{{ site.baseurl }}{{ page.url }}",
            "about": [
              "Instagram reels transcription",
              "Obsidian notes",
              "Markdown knowledge management",
              "Local Whisper transcription"
            ]
          },
          {
            "@type": "SoftwareApplication",
            "@id": "{{ site.url }}{{ site.baseurl }}{{ page.url }}#software",
            "name": "Reel Notes",
            "applicationCategory": "ProductivityApplication",
            "operatingSystem": "Windows, macOS, Linux",
            "softwareVersion": "0.1.0",
            "license": "https://github.com/gondalaimafia/reel-notes/blob/main/LICENSE",
            "codeRepository": "https://github.com/gondalaimafia/reel-notes",
            "downloadUrl": "https://github.com/gondalaimafia/reel-notes/releases/tag/v0.1.0",
            "description": {{ page.description | jsonify }}
          },
          {
            "@type": "FAQPage",
            "@id": "{{ site.url }}{{ site.baseurl }}{{ page.url }}#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "Is Reel Notes an Obsidian plugin?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "The first version is a command line tool that writes Obsidian ready Markdown into any vault folder."
                }
              },
              {
                "@type": "Question",
                "name": "Does Reel Notes need my Instagram password?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. You log in manually in a browser profile that you control, and Reel Notes reuses that browser session."
                }
              },
              {
                "@type": "Question",
                "name": "Can Reel Notes run without an OpenAI API key?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. Transcription can use a local Whisper model. LLM enrichment needs a model provider for topic filenames, key lessons, and cleaned notes."
                }
              }
            ]
          },
          {
            "@type": "BreadcrumbList",
            "@id": "{{ site.url }}{{ site.baseurl }}{{ page.url }}#breadcrumb",
            "itemListElement": [
              {
                "@type": "ListItem",
                "position": 1,
                "name": "Reel Notes",
                "item": "{{ site.url }}{{ site.baseurl }}/"
              },
              {
                "@type": "ListItem",
                "position": 2,
                "name": {{ page.title | jsonify }},
                "item": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
              }
            ]
          }
        ]
      }
    </script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --fg: #1f2421;
        --muted: #58615c;
        --link: #155eef;
        --border: #d8ddd8;
        --code: #ecefeb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #101412;
          --fg: #edf1ed;
          --muted: #a6aea8;
          --link: #8bb4ff;
          --border: #303832;
          --code: #1b211d;
        }
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 18px/1.6 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 56px 24px 80px;
      }

      h1 {
        font-size: clamp(2.2rem, 6vw, 4.25rem);
        line-height: 1.02;
        margin: 0 0 24px;
        letter-spacing: 0;
      }

      h2 {
        font-size: 1.55rem;
        margin-top: 48px;
        line-height: 1.2;
      }

      p,
      li {
        color: var(--fg);
      }

      a {
        color: var(--link);
      }

      code,
      pre {
        background: var(--code);
      }

      code {
        padding: 0.1rem 0.25rem;
        border-radius: 4px;
      }

      pre {
        overflow-x: auto;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      pre code {
        padding: 0;
        background: transparent;
      }

      blockquote {
        margin-left: 0;
        padding-left: 18px;
        border-left: 4px solid var(--border);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
